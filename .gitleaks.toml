# Gitleaks config for BRAINS repos
# Uses default rules + project-specific allowlist
title = "BRAINS Gitleaks Config"

[extend]
useDefault = true

[allowlist]
description = "Project-wide allowlist"
paths = [
  '''\.gitleaks\.toml''',
  '''docs/.*example.*''',
  '''.*\.example\..*''',
  '''.*\.sample\..*''',
  '''.*fixtures.*''',
  '''.*test.*data.*''',
]
regexes = [
  '''(?i)(example|sample|placeholder|dummy|fake|test)[-_]?(key|token|secret)''',
]
