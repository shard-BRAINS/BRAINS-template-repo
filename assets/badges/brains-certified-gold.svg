<svg xmlns="http://www.w3.org/2000/svg" width="540" height="172" viewBox="0 0 540 172" role="img" aria-label="BRAINS Certified — Gold Standard">
  <title>BRAINS Certified — Gold Standard</title>
  <desc>BRAINS Certified Gold Standard badge: two clean interlocking brass-gold rings on a deep navy aurora-style background with a diagonal gradient and a soft gold radial glow in the upper right; the rings carry a refined antique-gold gradient and a subtle drop shadow that lifts them from the surface. The interlock between the rings is a true mask cut-out so the gradient background flows through cleanly. Eyebrow text reads BRAINS CERTIFIED · GOLD; headline reads Gold Standard, with sub-line Exemplary across the board.</desc>

  <defs>
    <linearGradient id="gold" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#E2BE6E"/>
      <stop offset="0.5" stop-color="#C9A057"/>
      <stop offset="1" stop-color="#8E6A2A"/>
    </linearGradient>
    <linearGradient id="goldText" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E2BE6E"/>
      <stop offset="1" stop-color="#C9A057"/>
    </linearGradient>
    <linearGradient id="goldBorder" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D9B466"/>
      <stop offset="1" stop-color="#8E6A2A"/>
    </linearGradient>
    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1426"/>
      <stop offset="0.55" stop-color="#1a2542"/>
      <stop offset="1" stop-color="#08101e"/>
    </linearGradient>
    <radialGradient id="auroraGlow" cx="0.78" cy="0.22" r="0.55">
      <stop offset="0" stop-color="#C9A057" stop-opacity="0.26"/>
      <stop offset="0.55" stop-color="#C9A057" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#C9A057" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="logoGlow2" cx="0.18" cy="0.5" r="0.3">
      <stop offset="0" stop-color="#E2BE6E" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#E2BE6E" stop-opacity="0"/>
    </radialGradient>
    <filter id="lift" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset in="blur" dx="0" dy="3" result="offsetblur"/>
      <feFlood flood-color="#000000" flood-opacity="0.55" result="floodcolor"/>
      <feComposite in="floodcolor" in2="offsetblur" operator="in" result="dropshadow"/>
      <feMerge>
        <feMergeNode in="dropshadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <mask id="leftOverRight" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="540" height="172" fill="white"/>
      <circle cx="78" cy="86" r="33" fill="none" stroke="black" stroke-width="10"/>
    </mask>
    <clipPath id="cardClip-v2">
      <rect x="2" y="2" width="536" height="168" rx="18"/>
    </clipPath>
  </defs>

  <rect x="2" y="2" width="536" height="168" rx="18" fill="url(#aurora)"/>

  <g clip-path="url(#cardClip-v2)">
    <rect x="2" y="2" width="536" height="168" fill="url(#auroraGlow)"/>
    <rect x="2" y="2" width="536" height="168" fill="url(#logoGlow2)"/>
  </g>

  <rect x="2.75" y="2.75" width="534.5" height="166.5" rx="17.25" fill="none" stroke="url(#goldBorder)" stroke-width="1.5"/>

  <g filter="url(#lift)">
    <circle cx="126" cy="86" r="33" fill="none" stroke="url(#gold)" stroke-width="9" mask="url(#leftOverRight)"/>
    <circle cx="78" cy="86" r="33" fill="none" stroke="url(#gold)" stroke-width="9"/>
  </g>

  <text x="200" y="58" font-family="'Inter','Segoe UI',Helvetica,Arial,sans-serif" font-size="11.5" font-weight="600" letter-spacing="3.6" fill="#F4F1E8" opacity="0.9">BRAINS CERTIFIED · GOLD</text>

  <text x="200" y="102" font-family="'Inter','Segoe UI',Helvetica,Arial,sans-serif" font-size="33" font-weight="800" letter-spacing="0.8" fill="url(#goldText)">Gold Standard</text>

  <text x="200" y="130" font-family="'Inter','Segoe UI',Helvetica,Arial,sans-serif" font-size="13" font-weight="500" fill="#cfd9f0" opacity="0.88">Exemplary across the board.</text>

  <g transform="translate(508, 146)">
    <circle r="11" fill="none" stroke="url(#goldBorder)" stroke-width="1.3"/>
    <path d="M -5 0 L -1 4 L 5.5 -3.5" fill="none" stroke="url(#goldBorder)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
