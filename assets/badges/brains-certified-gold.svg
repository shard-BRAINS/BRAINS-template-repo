<svg xmlns="http://www.w3.org/2000/svg" width="540" height="172" viewBox="0 0 540 172" role="img" aria-label="BRAINS Certified — Gold Standard">
  <title>BRAINS Certified — Gold Standard</title>
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F4D06A"/>
      <stop offset="0.45" stop-color="#D99518"/>
      <stop offset="1" stop-color="#A86B0E"/>
    </linearGradient>
    <linearGradient id="goldText" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4D06A"/>
      <stop offset="1" stop-color="#D99518"/>
    </linearGradient>
  </defs>

  <!-- card -->
  <rect x="2" y="2" width="536" height="168" rx="18" fill="#0A0A0A"/>
  <rect x="2.75" y="2.75" width="534.5" height="166.5" rx="17.25" fill="none" stroke="url(#gold)" stroke-width="1.5"/>

  <!-- interlocking-ring mark (BRAINS orbit motif) -->
  <g fill="none" stroke="url(#gold)" stroke-width="11" stroke-linecap="round">
    <circle cx="78" cy="86" r="33"/>
    <circle cx="126" cy="86" r="33"/>
  </g>
  <path d="M 100 60 A 33 33 0 0 1 100 112" fill="none" stroke="#0A0A0A" stroke-width="15"/>
  <path d="M 100 60 A 33 33 0 0 1 100 112" fill="none" stroke="url(#gold)" stroke-width="11" stroke-linecap="round"/>

  <!-- text lockup -->
  <text x="196" y="74" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="30" font-weight="700" letter-spacing="2" fill="url(#goldText)">BRAINS</text>
  <text x="196" y="100" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="17" font-weight="600" letter-spacing="6.5" fill="#FFFFFF">CERTIFIED</text>

  <line x1="196" y1="116" x2="506" y2="116" stroke="url(#gold)" stroke-width="1" opacity="0.55"/>

  <text x="196" y="140" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" font-weight="700" letter-spacing="4" fill="#D99518">GOLD STANDARD</text>
  <g transform="translate(476,126)">
    <circle cx="11" cy="11" r="11" fill="url(#gold)"/>
    <path d="M 6 11.5 L 9.5 15 L 16 7.5" fill="none" stroke="#0A0A0A" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
