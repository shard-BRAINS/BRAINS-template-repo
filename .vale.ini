StylesPath = .vale/styles
MinAlertLevel = suggestion

Packages = write-good, alex

[*.md]
BasedOnStyles = Vale, BRAINS, write-good, alex

# Tone down some write-good rules that conflict with BRAINS voice
write-good.E-Prime = NO
write-good.Passive = warning

# alex catches insensitive language; we want all of it
alex.Ablist = error
alex.Condescending = error
alex.ProfanityLikely = error

# BRAINS rules - all errors by default (configurable per-rule in YAML)
BRAINS.ProtectedPhrases = error
BRAINS.NearParaphrase = error
BRAINS.DoDontTerms = error
BRAINS.DeficitFraming = error
BRAINS.PuzzlePiece = error
BRAINS.BrandCapitalization = error
BRAINS.SentenceLength = warning
BRAINS.PassiveOveruse = warning

[CHANGELOG.md]
BasedOnStyles =
